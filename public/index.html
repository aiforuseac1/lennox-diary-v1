<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LENNOX's Diary — 结构化每日复盘与成长记录</title>
  <meta name="description" content="LENNOX 的个人日记博客，记录每日复盘、AI 开发实践、学习洞察与成长轨迹。结构化内容，公开可访问。">
  <meta name="author" content="LENNOX">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="LENNOX's Diary">
  <meta property="og:description" content="结构化每日复盘与成长记录">
  <meta property="og:type" content="website">

  <!-- Schema.org for AI crawlers -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "LENNOX's Diary",
    "description": "结构化每日复盘与成长记录：AI 开发实践、注意力管理、学业成长",
    "author": { "@type": "Person", "name": "LENNOX" },
    "inLanguage": "zh-CN"
  }
  </script>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="inner">
      <a href="/" class="site-title">LENNOX<span>'s</span> Diary</a>
      <nav class="site-nav">
        <a href="/" class="active">日记</a>
        <a href="/editor.html">写日记</a>
      </nav>
    </div>
  </header>

  <main class="content-wrapper">
    <h1 class="page-heading">每日复盘</h1>
    <p class="page-subtitle">结构化记录 · AI 开发 · 注意力管理 · 学业成长</p>

    <ul class="entry-list" id="entryList">
      <!-- Entries loaded dynamically from manifest.json -->
      <li class="entry-item" style="color: var(--text-muted); font-size: 0.9rem;">
        正在加载日记列表…
      </li>
    </ul>
  </main>

  <footer class="site-footer">
    LENNOX's Diary · Hosted on Wasmer Edge
  </footer>

  <script>
    async function loadEntries() {
      const list = document.getElementById('entryList');
      try {
        const resp = await fetch('/entries/manifest.json');
        const data = await resp.json();

        if (!data.entries || data.entries.length === 0) {
          list.innerHTML = '<li class="entry-item" style="color:var(--text-muted)">暂无日记</li>';
          return;
        }

        // Sort by date descending (newest first)
        const sorted = data.entries.sort((a, b) => b.date.localeCompare(a.date));

        list.innerHTML = sorted.map(entry => `
          <li class="entry-item">
            <a href="/entries/${entry.file}">
              <div class="entry-date">${entry.date}</div>
              <div class="entry-title">${entry.title}</div>
              ${entry.summary ? `<div class="entry-summary">${entry.summary}</div>` : ''}
              ${entry.tags && entry.tags.length ? `
                <div class="entry-tags">
                  ${entry.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
              ` : ''}
            </a>
          </li>
        `).join('');

      } catch (e) {
        list.innerHTML = '<li class="entry-item" style="color:var(--text-muted)">加载失败，请刷新重试</li>';
        console.error('Failed to load manifest:', e);
      }
    }

    loadEntries();
  </script>

</body>
</html>
